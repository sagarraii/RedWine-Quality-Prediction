data:
  raw_path: data/raw
  processed_path: data/processed
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

model:
  type: linear
  input_dim: 100
  hidden_dim: 64
  output_dim: 1
  activation: relu

training:
  batch_size: 32
  epochs: 10
  learning_rate: 0.001
  optimizer: adam

evaluation:
  metrics:
    - accuracy
    - loss
  save_best: true

logging:
  save_dir: logs
  verbosity: info
